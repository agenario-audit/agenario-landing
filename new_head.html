<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Agenario Labs – Enterprise AI Systems Agency</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Enterprise-grade AI pipelines, agentic swarms, and governance. We architect, deploy, and stress-test autonomous AI systems for mid-market and enterprise clients, secured by the Agenario red-teaming engine." />
  <meta name="robots" content="index, follow" />

  <!-- Favicon -->
  <link rel="icon" type="image/jpg" href="Agenario.jpg">

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Agenario Labs" />
  <meta property="og:title" content="Agenario Labs – Enterprise AI Systems Agency" />
  <meta property="og:description" content="We don’t build chatbots. We build autonomous systems that scale your business, secured by the Agenario™ red-teaming engine." />
  <meta property="og:image" content="https://agenario.tech/agenario.jpg" />

  <!-- Google Fonts - Luxury B2B Theme -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // Premium Diamond & Gold Luxury Palette
            baseDark: '#0A0A0A',       // Pure Black
            surfaceDark: '#121A22',    // Dark Diamond Blue
            surfaceGlow: '#1B2D3E',    // Deep Blue-Gray
            accentBlur: '#1B3D5E',     // Diamond Blue
            accentViolet: '#C9A84C',   // Rich Gold (replacing violet)
            accentTeal: '#1B3D5E',     // Diamond Blue (replacing teal)
            accentText: '#E2DFDA',     // Diamond White (replacing indigo 200)
            
            // Old Palette (Kept for Engine section)
            bg: '#0A0A0A',             // Pure Black
            primary: '#1B3D5E',        // Diamond Blue
            secondary: '#C9A84C',      // Rich Gold
            muted: '#e2e8f0',          // Keep for compatibility
            accentBlue: '#1B3D5E',     // Diamond Blue
            accentEmerald: '#C9A84C',  // Rich Gold
            accentNeutral: '#94a3b8',  // Keep neutral
          },
          fontFamily: {
            heading: ['Outfit', 'sans-serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            glow: '0 0 25px rgba(201, 168, 76, 0.7)',
            glowCyan: '0 0 25px rgba(15, 58, 82, 0.7)',
            'premium-glow': '0 0 40px rgba(201, 168, 76, 0.15)',
            card: '0 4px 24px rgba(0,0,0,0.4)',
          },
          animation: {
            pulseGlow: 'pulseGlow 2s infinite',
            float: 'float 6s ease-in-out infinite',
          },
          keyframes: {
            pulseGlow: {
              '0%, 100%': { boxShadow: '0 0 25px rgba(201, 168, 76, 0.7)' },
              '50%': { boxShadow: '0 0 40px rgba(201, 168, 76, 1)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-10px)' },
            }
          },
        },
      },
    }
  </script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- Three.js (For Engine Section) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <!-- Global + Agenario styles -->
  <style>
    body {
      background: #0A0A0A;
      overflow-x: hidden;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #e4e4e7; /* Zinc 200 */
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Outfit', sans-serif;
      color: #ffffff;
      letter-spacing: -0.02em;
    }

    .premium-glass {
      background: rgba(24, 24, 27, 0.4); /* Zinc 900 semi-transparent */
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }
    
    .premium-card {
      background: linear-gradient(180deg, rgba(24, 24, 27, 0.7) 0%, rgba(9, 9, 11, 0.9) 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    
    .premium-card:hover {
      border-color: rgba(201, 168, 76, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 10px 40px -10px rgba(201, 168, 76, 0.15);
    }

    .premium-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    }

    .text-gradient {
      background: linear-gradient(to right, #E2DFDA, #C9A84C);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .btn-primary {
      background: linear-gradient(135deg, #C9A84C 0%, #1B3D5E 100%);
      color: white;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 20px rgba(201, 168, 76, 0.3);
      transition: all 0.3s ease;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, #D4AF5A 0%, #1A4D5C 100%);
      opacity: 0;
      z-index: -1;
      transition: opacity 0.3s ease;
    }

    .btn-primary:hover::before {
      opacity: 1;
    }
    
    .btn-primary:hover {
      box-shadow: 0 0 30px rgba(201, 168, 76, 0.5);
    }

    /* Engine Glass + Glow (Preserved) */
    .glass {
      background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(18px); border: 1px solid rgba(148, 163, 184, 0.25); box-shadow: 0 18px 60px rgba(15, 23, 42, 0.9); position: relative;
    }
    .glass::before {
      content: ''; position: absolute; inset: -1px; background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.15), transparent 60%); border-radius: inherit; z-index: -1; filter: blur(12px);
    }
    .icon-glow { filter: drop-shadow(0 0 18px rgba(56, 189, 248, 0.8)); }
    .particle { position: absolute; width: 4px; height: 4px; background: radial-gradient(circle, rgba(201, 168, 76, 0.8), transparent); border-radius: 50%; animation: particleFloat 10s linear infinite; }
    .particle:nth-child(odd) { background: radial-gradient(circle, rgba(15, 58, 82, 0.8), transparent); animation-duration: 12s; }
    .particle:nth-child(3n) { background: radial-gradient(circle, rgba(240, 244, 248, 0.8), transparent); animation-duration: 15s; }
    @keyframes particleFloat { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-100px) rotate(360deg); opacity: 0; } }
    .marquee-container { overflow: hidden; width: 100%; }
    .marquee-row { display: flex; width: 2000px; animation: marquee 20s linear infinite; }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    #threejs-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
  </style>
</head>
<body class="text-zinc-200 relative antialiased selection:bg-[#C9A84C] selection:text-white">
